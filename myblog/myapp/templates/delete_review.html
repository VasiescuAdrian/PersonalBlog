{% load static %}

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmare ștergere review</title>
  <link rel="stylesheet" href="{% static 'css/delete_review.css' %}" />
</head>
<body>
  <div class="delete-review-container">
    <h2>Confirmare ștergere review</h2>
    <p>Ești sigur că vrei să ștergi acest review?</p>

    <form method="POST" action="{% url 'delete_review' review.id %}">
      {% csrf_token %}
      <button type="submit" class="confirm">Da, șterge</button>
      <a href="{% url 'home' %}">
        <button type="button" class="cancel">Anulează</button>
      </a>
    </form>
  </div>
</body>
</html>
